---
name: CI

"on":
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ansible-lint
        run: pip install ansible-lint yamllint

      - name: Run yamllint
        run: |
          set -x
          yamllint -f parsable .

      - name: Run ansible-lint
        run: ansible-lint

  molecule:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Molecule and dependencies
        run: |
          pip install molecule molecule-plugins[docker] ansible docker

      - name: Install Ansible collections
        working-directory: nexus
        run: ansible-galaxy collection install -r ../collections/requirements.yml

      - name: Debug Molecule configuration
        working-directory: nexus
        run: |
          pwd
          echo "===== FILES ====="
          find . -maxdepth 3 -type f | sort
          echo
          echo "===== converge.yml ====="
          cat molecule/default/converge.yml
          echo
          echo "===== molecule.yml ====="
          cat molecule/default/molecule.yml
          echo
          echo "===== meta/main.yml ====="
          cat meta/main.yml

      - name: Debug Ansible
        working-directory: nexus
        run: |
          ansible --version
          ansible-config dump | grep ROLES_PATH

      - name: Run Molecule test
        working-directory: nexus
        run: molecule --debug converge

      - name: Run Molecule converge
        working-directory: nexus
        run: molecule converge --debug
        continue-on-error: true

      - name: Show dpkg log
        if: always()
        run: |
          docker ps -a
          CONTAINER=$(docker ps -aq | head -n1)
          docker exec "$CONTAINER" cat /var/log/dpkg.log || true
          docker exec "$CONTAINER" apt-cache policy openjdk-17-jdk || true

      - name: Run Molecule test
        working-directory: nexus
        run: molecule test
        env:
          PY_COLORS: "1"
          ANSIBLE_FORCE_COLOR: "1"
