---
- name: Check whether the initial admin password file still exists
  ansible.builtin.stat:
    path: "{{ nexus_admin_default_password_file }}"
  register: nexus_admin_pw_file_stat

- name: Check whether the admin password already works (post first-run)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/status"
    method: GET
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: true
    status_code: 200
  register: admin_password_check
  failed_when: false
  changed_when: false
  no_log: true

- name: Read initial admin password
  ansible.builtin.slurp:
    src: "{{ nexus_admin_default_password_file }}"
  register: admin_password_file
  no_log: true
  when:
    - nexus_admin_pw_file_stat.stat.exists
    - admin_password_check.status != 200

- name: Decode initial admin password
  ansible.builtin.set_fact:
    nexus_initial_password: "{{ admin_password_file.content | b64decode | trim }}"
  no_log: true
  when:
    - nexus_admin_pw_file_stat.stat.exists
    - admin_password_check.status != 200

- name: Change default admin password (first run)
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/security/users/admin/change-password"
    method: PUT
    user: admin
    password: "{{ nexus_initial_password }}"
    force_basic_auth: true
    body: "{{ nexus_admin_password }}"
    body_format: raw
    status_code: 204
  when:
    - nexus_admin_pw_file_stat.stat.exists
    - admin_password_check.status != 200
  no_log: true

- name: Fail with a clear message if password file is gone AND target password doesn't work
  ansible.builtin.fail:
    msg: >-
      admin.password no longer exists (already consumed by a previous run)
      and nexus_admin_password ({{ nexus_admin_password }}) does not
      authenticate. Nexus admin password is now unknown to this role.
      Reset it manually via the Nexus UI or the sonatype-work database,
      then re-run with the correct nexus_admin_password.
  when:
    - not nexus_admin_pw_file_stat.stat.exists
    - admin_password_check.status != 200

- name: Enable or disable anonymous access
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ nexus_port }}/service/rest/v1/security/anonymous"
    method: PUT
    user: admin
    password: "{{ nexus_admin_password }}"
    force_basic_auth: true
    body_format: json
    body:
      enabled: "{{ nexus_anonymous_access }}"
      userId: anonymous
      realmName: NexusAuthorizingRealm
    status_code:
      - 200
      - 204
