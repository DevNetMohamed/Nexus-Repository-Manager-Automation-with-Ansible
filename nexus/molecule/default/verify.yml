---
- name: Verify
  hosts: all
  become: true

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Verify Nexus service is running
      ansible.builtin.assert:
        that:
          - ansible_facts.services["nexus.service"].state == "running"
        fail_msg: "Nexus service is not running."
        success_msg: "Nexus service is running."

    - name: Check Nexus REST status endpoint
      ansible.builtin.uri:
        url: "http://127.0.0.1:8081/service/rest/v1/status"
        status_code: 200
      register: status_result
      retries: 10
      delay: 15
      until: status_result.status == 200
