---
dependency:
  name: galaxy

driver:
  name: docker

platforms:
  - name: nexus-ubuntu2404
    image: "geerlingguy/docker-ubuntu2404-ansible:latest"
    command: ${MOLECULE_DOCKER_COMMAND:-""}
    privileged: true
    pre_build_image: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw

provisioner:
  name: ansible
  role_name_check: false
  env:
    ANSIBLE_ROLES_PATH: "${MOLECULE_PROJECT_DIRECTORY}/.."

  playbooks:
    converge: converge.yml
    verify: verify.yml

  inventory:
    host_vars:
      nexus-ubuntu2404:
        nexus_port: 8081

verifier:
  name: ansible
